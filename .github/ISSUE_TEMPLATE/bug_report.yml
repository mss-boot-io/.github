name: Bug report
description: Report a reproducible defect.
title: "fix: "
labels:
  - type/bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which repository is affected?
      placeholder: mss-boot-admin
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Go/Node version, deployment environment, commit SHA, or image tag.
    validations:
      required: true
