name: Feature request
description: Propose a scoped product or platform improvement.
title: "feat: "
labels:
  - type/feature
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What behavior, API, UI, or workflow do you propose?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: API or contract change
        - label: Database or migration change
        - label: Frontend behavior change
        - label: Documentation change
        - label: Security-sensitive change
